#cloud-config
package_update: true
packages:
  - nginx
  - curl
  - dnsutils
write_files:
  - path: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html><head><title>Jumpbox - DNS Failover Demo</title>
      <style>body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#2d2d2d;color:#0f0}
      .card{background:rgba(255,255,255,0.05);padding:40px 60px;border-radius:16px;text-align:center;border:1px solid #0f0}
      h1{font-size:2.5em;margin:0}p{font-size:1.2em;opacity:0.9}</style></head>
      <body><div class="card"><h1>Jumpbox</h1><p>Region: canadacentral</p><p>VM: vm-jumpbox</p><p>Role: DNS Failover Test Client</p></div></body></html>
runcmd:
  - systemctl enable nginx
  - systemctl restart nginx
